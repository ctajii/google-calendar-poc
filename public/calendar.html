<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      min-width: 180px;
      text-align: center;
    }

    header button {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    header button:hover { border-color: #555; }

    .calendar {
      max-width: 960px;
      margin: 0 auto;
    }

    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 2px;
    }

    .day-header {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      padding: 0.4rem 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cell {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 0.4rem;
      min-height: 90px;
      vertical-align: top;
    }

    .cell.other-month { opacity: 0.35; }

    .cell.today { border-color: #8ab4f8; }

    .day-num {
      font-size: 0.8rem;
      font-weight: 500;
      color: #888;
      margin-bottom: 0.25rem;
    }

    .cell.today .day-num {
      color: #8ab4f8;
      font-weight: 700;
    }

    .event-chip {
      font-size: 0.7rem;
      background: #1e3a5f;
      color: #8ab4f8;
      border-radius: 4px;
      padding: 0.15rem 0.35rem;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
      position: relative;
    }

    .event-chip:hover { background: #264a75; }

    /* Tooltip */
    .event-chip[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 0;
      top: 100%;
      margin-top: 4px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.75rem;
      color: #e0e0e0;
      white-space: normal;
      min-width: 180px;
      max-width: 260px;
      z-index: 10;
      line-height: 1.4;
      pointer-events: none;
    }

    .overflow {
      font-size: 0.65rem;
      color: #666;
      margin-top: 0.1rem;
    }

    .loading, .error {
      text-align: center;
      padding: 3rem;
      color: #888;
    }

    .error { color: #f28b82; }
  </style>
</head>
<body>
  <header>
    <button id="prev">&#8592;</button>
    <h1 id="month-label">Loading...</h1>
    <button id="next">&#8594;</button>
  </header>
  <div id="calendar-wrap">
    <div class="loading">Fetching events...</div>
  </div>

  <script>
    let allEvents = [];
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth(); // 0-indexed

    async function init() {
      try {
        const res = await fetch("/api/events");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        allEvents = data.events;
        render();
      } catch (err) {
        document.getElementById("calendar-wrap").innerHTML =
          `<div class="error">Failed to load events: ${err.message}</div>`;
      }
    }

    function render() {
      const label = new Date(currentYear, currentMonth, 1)
        .toLocaleDateString("en-US", { month: "long", year: "numeric" });
      document.getElementById("month-label").textContent = label;

      // Build event map: "YYYY-MM-DD" -> [events]
      const eventMap = {};
      for (const event of allEvents) {
        const key = event.allDay
          ? event.start  // already "YYYY-MM-DD"
          : event.start.slice(0, 10);
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(event);
      }

      const today = new Date();
      const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

      // First day of month (0=Sun), total days in month
      const firstDow = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

      const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

      let html = `
        <div class="calendar">
          <div class="day-headers">
            ${DAYS.map(d => `<div class="day-header">${d}</div>`).join("")}
          </div>
          <div class="grid">`;

      // Leading cells from previous month
      for (let i = firstDow - 1; i >= 0; i--) {
        const d = daysInPrev - i;
        html += `<div class="cell other-month"><div class="day-num">${d}</div></div>`;
      }

      // Current month cells
      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const isToday = key === todayKey;
        const events = eventMap[key] || [];
        const MAX_SHOW = 3;

        html += `<div class="cell${isToday ? " today" : ""}">`;
        html += `<div class="day-num">${d}</div>`;

        events.slice(0, MAX_SHOW).forEach(ev => {
          const time = ev.allDay ? "All day" : new Date(ev.start).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
          const tooltip = `${ev.title}&#10;${time}${ev.location ? "&#10;📍 " + ev.location : ""}`;
          html += `<div class="event-chip" data-tooltip="${tooltip}">${escapeHtml(ev.title)}</div>`;
        });

        if (events.length > MAX_SHOW) {
          html += `<div class="overflow">+${events.length - MAX_SHOW} more</div>`;
        }

        html += `</div>`;
      }

      // Trailing cells to fill last row
      const totalCells = firstDow + daysInMonth;
      const trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let d = 1; d <= trailing; d++) {
        html += `<div class="cell other-month"><div class="day-num">${d}</div></div>`;
      }

      html += `</div></div>`;
      document.getElementById("calendar-wrap").innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById("prev").addEventListener("click", () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      render();
    });

    document.getElementById("next").addEventListener("click", () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      render();
    });

    init();
  </script>
</body>
</html>
